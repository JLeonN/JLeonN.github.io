  - generic [ref=e83]:
    - generic [ref=e84]:
      - img [ref=e85]
      - heading "Pequeñas mejoras medibles" [level=2] [ref=e87]
    - paragraph [ref=e88]: La idea no es empezar con grandes sistemas, sino con prototipos pequeños, medibles y fáciles de corregir. A partir de una necesidad concreta se puede probar una herramienta simple, usarla en un área puntual, escuchar feedback y mejorarla por etapas.
    - paragraph [ref=e89]: "Un camino posible sería crear paneles básicos para transformar datos diarios en información útil para decidir: registros de tareas, incidencias, movimientos, tiempos, pedidos o cualquier dato que hoy ya exista, pero que todavía no se esté aprovechando de forma clara."
