      - heading "Jorge Núñez" [level=1] [ref=e8]
      - paragraph [ref=e9]: Una propuesta para aportar desde la inteligencia artificial, la capacitación interna, las automatizaciones y el desarrollo de software a medida.
      - generic [ref=e10]:
        - button "Imprimir propuesta" [ref=e11] [cursor=pointer]:
